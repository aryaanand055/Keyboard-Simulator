name: Build Keyboard

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Compile tests
        run: |
          g++ -std=c++17 -Wall -Wextra -o run_tests \
            tests/test_main.cpp \
            src/InputBuffer.cpp \
            src/ExpansionDictionary.cpp

      - name: Run tests
        run: ./run_tests

  build:
    name: Build ${{ matrix.platform }}
    needs: test
    runs-on: windows-latest

    strategy:
      matrix:
        include:
          - platform: x64
            msvc_platform: x64
            output_path: x64/Release/TextExpansionKeyboard.dll

          - platform: x86
            msvc_platform: Win32
            output_path: Win32/Release/TextExpansionKeyboard.dll

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build DLL (Release)
        run: >
          msbuild TextExpansionKeyboard.sln
          /p:Configuration=Release
          /p:Platform="${{ matrix.msvc_platform }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: ${{ matrix.output_path }}
          if-no-files-found: error

  package:
    name: Package Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download x64 build
        uses: actions/download-artifact@v4
        with:
          name: build-x64
          path: dist/x64

      - name: Download x86 build
        uses: actions/download-artifact@v4
        with:
          name: build-x86
          path: dist/x86

      - name: Create ZIP package
        run: |
          mkdir release
          cp -r dist/x64 release/
          cp -r dist/x86 release/
          cd release
          zip -r TextExpansionKeyboard.zip .

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: keyboard-release
          path: release/TextExpansionKeyboard.zip
