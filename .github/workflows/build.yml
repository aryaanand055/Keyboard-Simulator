name: Build Keyboard

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile tests
        run: >
          g++ -std=c++17 -Wall -Wextra -o run_tests
          tests/test_main.cpp
          src/InputBuffer.cpp
          src/ExpansionDictionary.cpp

      - name: Run tests
        run: ./run_tests

  build:
    name: Build ${{ matrix.platform }}
    needs: test
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - platform: x64
            msvc_platform: x64
          - platform: x86
            msvc_platform: Win32
    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build DLL (Release)
        run: msbuild TextExpansionKeyboard.sln /p:Configuration=Release /p:Platform=${{ matrix.msvc_platform }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: |
            ${{ matrix.platform == 'x86' && 'Win32' || matrix.platform }}/Release/TextExpansionKeyboard.dll
          if-no-files-found: error

  package:
    name: Package Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download x64 build
        uses: actions/download-artifact@v4.1.7
        with:
          name: build-x64
          path: staging/x64

      - name: Download x86 build
        uses: actions/download-artifact@v4.1.7
        with:
          name: build-x86
          path: staging/x86

      - name: Assemble package
        run: |
          mkdir -p package/x64 package/x86 package/config package/docs
          cp staging/x64/TextExpansionKeyboard.dll package/x64/
          cp staging/x86/TextExpansionKeyboard.dll package/x86/
          cp config/dictionary.json package/config/
          cp docs/deployment_guide.md docs/user_manual.md package/docs/
          cp install.bat package/
          cp README.md package/

      - name: Create ZIP
        run: |
          cd package
          zip -r ../TextExpansionKeyboard.zip .

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: TextExpansionKeyboard
          path: TextExpansionKeyboard.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: TextExpansionKeyboard.zip
          generate_release_notes: true