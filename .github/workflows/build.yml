name: Build Keyboard

on:
  push:
    branches:
      - main
    tags:
      - "v*"

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install compiler
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Compile tests
        run: |
          g++ -std=c++17 -Wall -Wextra -o run_tests \
            tests/test_main.cpp \
            src/InputBuffer.cpp \
            src/ExpansionDictionary.cpp

      - name: Run tests
        run: ./run_tests

  build:
    name: Build ${{ matrix.platform }}
    needs: test
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x64
            msvc_platform: x64
            output_path: x64/Release/TextExpansionKeyboard.dll

          - platform: x86
            msvc_platform: x86
            output_path: Win32/Release/TextExpansionKeyboard.dll

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build DLL
        shell: cmd
        run: |
          msbuild TextExpansionKeyboard.sln ^
            /p:Configuration=Release ^
            /p:Platform=${{ matrix.msvc_platform }}

      - name: Verify output exists
        shell: powershell
        run: |
          if (!(Test-Path "${{ matrix.output_path }}")) {
            Write-Error "Build output not found: ${{ matrix.output_path }}"
            exit 1
          }

      - name: Upload DLL Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: ${{ matrix.output_path }}
          if-no-files-found: error

  package:
    name: Package Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: build-x64
          path: release/x64

      - name: Download x86 artifact
        uses: actions/download-artifact@v4
        with:
          name: build-x86
          path: release/x86

      - name: Show files
        run: find release

      - name: Create ZIP package
        run: |
          cd release
          zip -r TextExpansionKeyboard.zip .

      - name: Upload Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: keyboard-release
          path: release/TextExpansionKeyboard.zip

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged ZIP
        uses: actions/download-artifact@v4
        with:
          name: keyboard-release
          path: final

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: final/TextExpansionKeyboard.zip
          generate_release_notes: true
